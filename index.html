<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --text: #e8e6e0;
    --muted: #888680;
    --green: #22c27a;
    --red: #e24b4a;
    --amber: #ef9f27;
    --blue: #378add;
    --accent: #7f77dd;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 { font-size: 16px; font-weight: 500; }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .dot.live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .status-text { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* server URL bar */
  .url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .url-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .url-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
  }
  .url-bar input:focus { outline: none; border-color: var(--accent); }
  .url-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .url-bar button:hover { opacity: 0.85; }

  /* device grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  .device-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .device-card.offline { opacity: 0.55; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .card-header .name { font-weight: 500; font-size: 14px; flex: 1; }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge.online  { background: rgba(34,194,122,0.15); color: var(--green); }
  .badge.offline { background: rgba(226,75,74,0.15);  color: var(--red); }

  .meta { display: flex; gap: 12px; margin-left: auto; }
  .meta span { font-size: 11px; color: var(--muted); }
  .meta .fps-val { color: var(--amber); }

  .screen-wrap {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
    overflow: hidden;
  }

  .screen-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    cursor: pointer;
  }

  .no-frame {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* fullscreen overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  #overlay.active { display: flex; }
  #overlay img { max-width: 95vw; max-height: 90vh; border-radius: 6px; }
  #overlay-label { color: var(--muted); font-size: 13px; }
  #overlay-close {
    position: fixed;
    top: 16px; right: 20px;
    background: none; border: none;
    color: var(--muted); font-size: 28px;
    cursor: pointer; line-height: 1;
  }
  #overlay-close:hover { color: var(--text); }

  #empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
  }
  #empty p { font-size: 15px; margin-bottom: 6px; }
  #empty small { font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="dot" id="conn-dot"></div>
  <h1>Device Monitor</h1>
  <span class="status-text" id="conn-status">Not connected</span>
</header>

<div class="url-bar">
  <label>Server URL</label>
  <input type="text" id="server-url" placeholder="https://abc123.ngrok-free.app" spellcheck="false">
  <button onclick="connect()">Connect</button>
</div>

<div id="grid">
  <div id="empty">
    <p>No devices yet</p>
    <small>Enter your ngrok URL above and click Connect</small>
  </div>
</div>

<!-- Fullscreen overlay -->
<div id="overlay">
  <button id="overlay-close" onclick="closeOverlay()">&#x2715;</button>
  <img id="overlay-img" src="" alt="">
  <span id="overlay-label"></span>
</div>

<script>
let evtSource = null;
const frames  = {};   // device_id -> latest base64 jpeg
const devices = {};   // device_id -> stats

function connect() {
  const raw = document.getElementById("server-url").value.trim().replace(/\/$/, "");
  if (!raw) return alert("Please enter your ngrok URL first.");
  localStorage.setItem("monitor_url", raw);
  startSSE(raw);
}

function startSSE(base) {
  if (evtSource) { evtSource.close(); }
  setStatus(false, "Connecting…");

  evtSource = new EventSource(base + "/events");

  evtSource.onopen = () => setStatus(true, "Live");

  evtSource.onerror = () => {
    setStatus(false, "Disconnected — retrying…");
  };

  evtSource.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === "stats") {
      msg.devices.forEach(d => updateDeviceStats(d));
    } else if (msg.type === "frame") {
      frames[msg.device] = msg.data;
      updateDeviceFrame(msg.device, msg.data);
    }
  };
}

function setStatus(live, text) {
  document.getElementById("conn-dot").className    = "dot" + (live ? " live" : "");
  document.getElementById("conn-status").textContent = text;
}

function ensureCard(did) {
  if (document.getElementById("card-" + did)) return;
  document.getElementById("empty").style.display = "none";

  const card = document.createElement("div");
  card.className = "device-card";
  card.id = "card-" + did;
  card.innerHTML = `
    <div class="card-header">
      <span class="name">${did}</span>
      <div class="meta">
        <span id="fps-${did}">— fps</span>
        <span id="fc-${did}">0 frames</span>
        <span id="seen-${did}">—</span>
      </div>
      <span class="badge offline" id="badge-${did}">offline</span>
    </div>
    <div class="screen-wrap">
      <div class="no-frame" id="noframe-${did}">Waiting for first frame…</div>
      <img id="img-${did}" src="" alt="${did}" style="display:none"
           onclick="openOverlay('${did}')">
    </div>`;
  document.getElementById("grid").appendChild(card);
}

function updateDeviceStats(d) {
  ensureCard(d.device_id);
  const id = d.device_id;
  devices[id] = d;

  const card  = document.getElementById("card-" + id);
  const badge = document.getElementById("badge-" + id);

  card.className  = "device-card" + (d.connected ? "" : " offline");
  badge.className = "badge " + (d.connected ? "online" : "offline");
  badge.textContent = d.connected ? "online" : "offline";

  const fpsEl = document.getElementById("fps-" + id);
  if (fpsEl) fpsEl.innerHTML = `<span class="fps-val">${d.fps}</span> fps`;

  const fcEl = document.getElementById("fc-" + id);
  if (fcEl) fcEl.textContent = d.frame_count + " frames";

  const seenEl = document.getElementById("seen-" + id);
  if (seenEl) seenEl.textContent = d.last_seen + "s ago";
}

function updateDeviceFrame(did, b64) {
  ensureCard(did);
  const img     = document.getElementById("img-" + did);
  const noframe = document.getElementById("noframe-" + did);
  if (img) {
    img.src = "data:image/jpeg;base64," + b64;
    img.style.display = "block";
  }
  if (noframe) noframe.style.display = "none";

  // also update overlay if open for this device
  const ol = document.getElementById("overlay");
  if (ol.classList.contains("active") &&
      document.getElementById("overlay-label").textContent === did) {
    document.getElementById("overlay-img").src = "data:image/jpeg;base64," + b64;
  }
}

function openOverlay(did) {
  const b64 = frames[did];
  if (!b64) return;
  document.getElementById("overlay-img").src = "data:image/jpeg;base64," + b64;
  document.getElementById("overlay-label").textContent = did;
  document.getElementById("overlay").classList.add("active");
}

function closeOverlay() {
  document.getElementById("overlay").classList.remove("active");
}

document.getElementById("overlay").addEventListener("click", function(e) {
  if (e.target === this) closeOverlay();
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeOverlay();
});

// Restore last URL
const saved = localStorage.getItem("monitor_url");
if (saved) {
  document.getElementById("server-url").value = saved;
  startSSE(saved);
}

// Refresh "X s ago" every second
setInterval(() => {
  Object.values(devices).forEach(d => {
    const el = document.getElementById("seen-" + d.device_id);
    if (el) el.textContent = Math.round(d.last_seen + (Date.now()/1000 - (performance.now()/1000))) + "s ago";
  });
}, 1000);
</script>
</body>
</html>
