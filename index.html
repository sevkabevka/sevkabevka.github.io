     SOUND MONITOR CONTROLS
     Paste this anywhere in your index.html <body>
     Replace YOUR_MASTER_KEY below with your JSONBin master key
     Get it from: https://jsonbin.io/app/app/api-keys
===================================================== -->

<style>
  .sound-monitor {
    display: inline-flex;
    gap: 10px;
    align-items: center;
    font-family: sans-serif;
  }
  .sm-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .sm-btn:active { transform: scale(0.96); }
  .sm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .sm-btn-enable  { background: #22c55e; color: #fff; }
  .sm-btn-disable { background: #ef4444; color: #fff; }
  .sm-status {
    font-size: 13px;
    color: #888;
    min-width: 80px;
  }
</style>

<div class="sound-monitor">
  <button class="sm-btn sm-btn-enable"  onclick="setSoundState('enabled')" >Enable Sound</button>
  <button class="sm-btn sm-btn-disable" onclick="setSoundState('disabled')">Disable Sound</button>
  <span class="sm-status" id="sm-status">...</span>
</div>

<script>
  const BIN_ID     = "69cad73736566621a862aed6";
  const MASTER_KEY = "$2a$10$6.rhrJu8pxalgRnlJe/dnurY/O0vMM86k239QJXMnPaio2BSXUa/e"; // ← paste your JSONBin master key here

  const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  const HEADERS  = {
    "Content-Type": "application/json",
    "X-Master-Key": MASTER_KEY
  };

  // Show current state on page load
  async function getSoundState() {
    try {
      const res  = await fetch(BASE_URL + "/latest", { headers: HEADERS });
      const data = await res.json();
      updateStatus(data.record.state);
    } catch (e) {
      document.getElementById("sm-status").textContent = "error";
    }
  }

  // Set state to "enabled" or "disabled"
  async function setSoundState(state) {
    document.querySelectorAll(".sm-btn").forEach(b => b.disabled = true);
    document.getElementById("sm-status").textContent = "saving...";
    try {
      await fetch(BASE_URL, {
        method:  "PUT",
        headers: HEADERS,
        body:    JSON.stringify({ state })
      });
      updateStatus(state);
    } catch (e) {
      document.getElementById("sm-status").textContent = "error";
    }
    document.querySelectorAll(".sm-btn").forEach(b => b.disabled = false);
  }

  function updateStatus(state) {
    const el = document.getElementById("sm-status");
    el.textContent = state === "enabled" ? "🔊 enabled" : "🔇 disabled";
    el.style.color  = state === "enabled" ? "#22c55e"   : "#ef4444";
  }

  getSoundState();
</script>
